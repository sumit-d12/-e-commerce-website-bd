<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxTech Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; }

/* 3D effect */
.card {
  transition: transform 0.4s;
}
.card:hover {
  transform: rotateY(10deg) scale(1.05);
}
</style>

</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="bg-black text-white p-4 flex justify-between">
  <h1 class="text-yellow-400 font-bold">LuxTech</h1>
  <div>
    Cart: <span id="count">0</span>
  </div>
</div>

<!-- Title -->
<h2 class="text-center text-3xl font-bold mt-6">Premium Electronics</h2>

<!-- Products -->
<div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-6"></div>

<!-- Cart -->
<div class="p-6">
  <h2 class="text-xl font-bold">Your Cart</h2>
  <div id="cart"></div>
</div>

<script>

let cart = [];

let products = [
  {
    name: "iPhone 15",
    price: 80000,
    img: "https://images.unsplash.com/photo-1695048133142-1a20484d2569"
  },
  {
    name: "Samsung S23",
    price: 70000,
    img: "https://images.unsplash.com/photo-1678652197831-2d180705cd2c"
  },
  {
    name: "MacBook",
    price: 120000,
    img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
  },
  {
    name: "Dell Laptop",
    price: 90000,
    img: "https://images.unsplash.com/photo-1496181133206-80ce9b88a853"
  }
];

function showProducts() {
  let html = "";

  products.forEach((p, i) => {
    html += `
      <div class="bg-white p-4 rounded shadow card text-center">
        <img src="${p.img}" class="h-40 w-full object-cover mb-2">
        <h3 class="font-bold">${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="add(${i})" class="bg-black text-white px-3 py-1 mt-2">
          Add
        </button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

function add(i) {
  cart.push(products[i]);
  document.getElementById("count").innerText = cart.length;
  showCart();
}

function showCart() {
  let html = "";

  cart.forEach(p => {
    html += `<p>${p.name} - ₹${p.price}</p>`;
  });

  document.getElementById("cart").innerHTML = html || "Cart is empty";
}

showProducts();

</script>

</body>
</html>
